services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in a .env file next to this compose file}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in a .env file}
      DATABASE_URL: postgresql://notes:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a .env file}@db:5432/notes
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a .env file}
      POSTGRES_DB: notes
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
