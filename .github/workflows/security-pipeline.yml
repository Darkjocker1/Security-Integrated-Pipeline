name: Security Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: devsecops-pipeline

jobs:
  # ---------------------------------------------------------------
  # Stage 1: Lint + unit tests
  # ---------------------------------------------------------------
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 app tests

      - name: Format check (black)
        run: black --check app tests

      - name: Run unit tests (pytest)
        run: pytest

  # ---------------------------------------------------------------
  # Stage 2: SAST - static analysis of source code
  # Fails on MEDIUM+ severity findings (-ll) at MEDIUM+ confidence (-ii)
  # ---------------------------------------------------------------
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r app -ll -ii

  # ---------------------------------------------------------------
  # Stage 3: Secrets detection - full git history scan
  # Fails on ANY leaked credential
  # ---------------------------------------------------------------
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------
  # Stage 4: SCA - dependency vulnerability scan against PyPI Advisory DB
  # Fails on any known CVE in pinned dependencies
  # ---------------------------------------------------------------
  dependency-scan:
    name: SCA (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --desc

  # ---------------------------------------------------------------
  # Stage 5: Build image + container scan
  # Trivy fails the job on CRITICAL/HIGH vulnerabilities with fixes
  # ---------------------------------------------------------------
  container-scan:
    name: Build & Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [lint-and-test, sast, secrets-scan, dependency-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # -----------------------------------------------------------
      # Optional publish: create a repository variable
      # DOCKERHUB_ENABLED=true and secrets DOCKERHUB_USERNAME /
      # DOCKERHUB_TOKEN to activate these steps.
      # -----------------------------------------------------------
      - name: Log in to Docker Hub
        if: vars.DOCKERHUB_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: vars.DOCKERHUB_ENABLED == 'true'
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
