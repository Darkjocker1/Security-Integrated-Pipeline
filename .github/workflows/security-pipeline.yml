name: Security Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pipeline:
    name: Build, Test & Scan
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/security-integrated-pipeline

    steps:
      #Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Gitleaks

      #Set up Python 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      #Install dependencies 
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      #Lint
      - name: Lint (flake8)
        run: flake8 app/ --max-line-length=120

      - name: Format check (black)
        run: black --check app/

      #Unit tests
      - name: Run unit tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: pytest --tb=short -q

      #SAST — Bandit 
      - name: SAST scan (Bandit)
        run: |
          pip install bandit
          bandit -r app/ -ll -ii --exit-zero-on-skipped -f json -o bandit-report.json
          bandit -r app/ -ll -ii --exit-zero-on-skipped

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      # Secrets scan — Gitleaks 
      - name: Secrets scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      #Dependency scan — pip-audit 
      - name: Dependency scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --output json -o pip-audit-report.json
          pip-audit -r requirements.txt

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

      #Build Docker image
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest .

      # Container scan — Trivy
      - name: Container scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGHd
          ignore-unfixed: true

      - name: Upload Trivy report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-report.sarif
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-report.sarif

      #Push image to Docker Hub 
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
